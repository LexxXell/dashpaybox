name: Bug report
description: Report a problem with DashPayBox
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Do not report security vulnerabilities here** —
        see [SECURITY.md](https://github.com/lexxxell/dashpaybox/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. POST /intents with ...
        2. Pay ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / image tag
      placeholder: "e.g. v0.1.0 or sha-abc1234"
    validations:
      required: true
  - type: dropdown
    id: network
    attributes:
      label: Network
      options:
        - testnet
        - mainnet
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs (redact secrets, addresses, and txids if sensitive).
      render: shell
